<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第一式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">两手托天理三焦</text>
  <!-- 头 -->
  <circle cx="100" cy="90" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 身体 -->
  <line x1="100" y1="106" x2="100" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 双手上举 -->
  <line x1="100" y1="125" x2="75" y2="105" stroke="#333" stroke-width="2.5"/>
  <line x1="75" y1="105" x2="75" y2="68" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="125" x2="125" y2="105" stroke="#333" stroke-width="2.5"/>
  <line x1="125" y1="105" x2="125" y2="68" stroke="#333" stroke-width="2.5"/>
  <!-- 双手交叉 -->
  <line x1="68" y1="68" x2="132" y2="68" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <!-- 腿 -->
  <line x1="100" y1="185" x2="78" y2="240" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="122" y2="240" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="78" y1="240" x2="65" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="122" y1="240" x2="135" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 提示 -->
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">双手交叉上举过头</text>
</svg>

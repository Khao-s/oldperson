<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第八式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">背后七颠百病消</text>
  <!-- 头 -->
  <circle cx="100" cy="80" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 身体 -->
  <line x1="100" y1="96" x2="100" y2="175" stroke="#333" stroke-width="2.5"/>
  <!-- 双手自然下垂 -->
  <line x1="100" y1="115" x2="78" y2="160" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="115" x2="122" y2="160" stroke="#333" stroke-width="2.5"/>
  <!-- 腿 -->
  <line x1="100" y1="175" x2="82" y2="230" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="175" x2="118" y2="230" stroke="#333" stroke-width="2.5"/>
  <!-- 脚跟提起（虚线表示动作） -->
  <line x1="82" y1="230" x2="69" y2="235" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="118" y1="230" x2="131" y2="235" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 提踵箭头 -->
  <line x1="82" y1="230" x2="82" y2="218" stroke="#c41a16" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="118" y1="230" x2="118" y2="218" stroke="#c41a16" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs><marker id="arrow3" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#c41a16"/></marker></defs>
  <!-- 整体上提虚线 -->
  <line x1="100" y1="68" x2="100" y2="55" stroke="#c4a35a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">脚跟提起再轻轻落下</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第二式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">左右开弓似射雕</text>
  <!-- 头 -->
  <circle cx="100" cy="90" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 身体 -->
  <line x1="100" y1="106" x2="100" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 左手推弓 -->
  <line x1="100" y1="125" x2="55" y2="118" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="116" r="5" fill="#c41a16"/>
  <!-- 右手拉弦 -->
  <line x1="100" y1="125" x2="140" y2="118" stroke="#333" stroke-width="2.5"/>
  <line x1="140" y1="118" x2="148" y2="118" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 弓 -->
  <path d="M50 116 Q35 85 50 54" stroke="#c4a35a" stroke-width="2" fill="none"/>
  <line x1="50" y1="54" x2="148" y2="118" stroke="#c4a35a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 马步 -->
  <line x1="100" y1="185" x2="70" y2="240" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="130" y2="240" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="70" y1="240" x2="57" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="240" x2="143" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">马步拉弓，左右交替</text>
</svg>

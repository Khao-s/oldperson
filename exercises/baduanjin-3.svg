<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第三式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">调理脾胃须单举</text>
  <!-- 头 -->
  <circle cx="100" cy="90" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 身体 -->
  <line x1="100" y1="106" x2="100" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 左手上举 -->
  <line x1="100" y1="125" x2="80" y2="105" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="105" x2="80" y2="62" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <!-- 右手下按 -->
  <line x1="100" y1="125" x2="120" y2="145" stroke="#333" stroke-width="2.5"/>
  <line x1="120" y1="145" x2="120" y2="190" stroke="#333" stroke-width="2.5"/>
  <!-- 对拉箭头 -->
  <line x1="80" y1="72" x2="80" y2="58" stroke="#c4a35a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="180" x2="120" y2="194" stroke="#c4a35a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#c4a35a"/></marker></defs>
  <!-- 腿 -->
  <line x1="100" y1="185" x2="80" y2="240" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="120" y2="240" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="80" y1="240" x2="67" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="240" x2="133" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">一手托天，一手下按</text>
</svg>

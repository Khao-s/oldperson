<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第七式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">攒拳怒目增气力</text>
  <!-- 头 -->
  <circle cx="100" cy="90" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 怒目 -->
  <line x1="92" y1="87" x2="98" y2="87" stroke="#c41a16" stroke-width="2" stroke-linecap="round"/>
  <line x1="102" y1="87" x2="108" y2="87" stroke="#c41a16" stroke-width="2" stroke-linecap="round"/>
  <!-- 身体 -->
  <line x1="100" y1="106" x2="100" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 左拳冲出 -->
  <line x1="100" y1="125" x2="140" y2="120" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <rect x="138" y="115" width="12" height="10" rx="2" fill="#c41a16"/>
  <!-- 右拳收于腰间 -->
  <line x1="100" y1="125" x2="80" y2="140" stroke="#333" stroke-width="2.5"/>
  <rect x="68" y="137" width="12" height="10" rx="2" fill="#333"/>
  <!-- 马步 -->
  <line x1="100" y1="185" x2="72" y2="240" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="128" y2="240" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="72" y1="240" x2="59" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="128" y1="240" x2="141" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 冲拳箭头 -->
  <line x1="118" y1="120" x2="135" y2="118" stroke="#c4a35a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <defs><marker id="arrow2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#c4a35a"/></marker></defs>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">马步冲拳，怒目圆睁</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第五式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">摇头摆尾去心火</text>
  <!-- 头 -->
  <circle cx="100" cy="90" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 身体（微倾） -->
  <line x1="100" y1="106" x2="95" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 双手扶膝 -->
  <line x1="100" y1="125" x2="75" y2="180" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="125" x2="115" y2="180" stroke="#333" stroke-width="2.5"/>
  <!-- 摇转弧线 -->
  <path d="M60 185 Q45 210 70 225 Q95 240 120 225 Q145 210 130 185" stroke="#c41a16" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- 马步 -->
  <line x1="95" y1="185" x2="68" y2="235" stroke="#333" stroke-width="2.5"/>
  <line x1="95" y1="185" x2="122" y2="235" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="68" y1="235" x2="55" y2="240" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="122" y1="235" x2="135" y2="240" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">身体做圆弧摇转</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第四式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">五劳七伤往后瞧</text>
  <!-- 头（转向后方） -->
  <circle cx="95" cy="90" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 视线 -->
  <line x1="82" y1="85" x2="70" y2="80" stroke="#c41a16" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="67" cy="79" r="2" fill="#c41a16"/>
  <!-- 身体 -->
  <line x1="100" y1="106" x2="100" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 双手自然下垂 -->
  <line x1="100" y1="125" x2="75" y2="170" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="125" x2="125" y2="170" stroke="#333" stroke-width="2.5"/>
  <!-- 转头弧线 -->
  <path d="M85 75 Q60 60 68 79" stroke="#c4a35a" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <!-- 腿 -->
  <line x1="100" y1="185" x2="80" y2="240" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="120" y2="240" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="80" y1="240" x2="67" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="240" x2="133" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">头缓缓转向后方</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <rect width="200" height="280" rx="12" fill="#faf6eb" stroke="#c4a35a" stroke-width="2"/>
  <text x="100" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#c41a16">第六式</text>
  <text x="100" y="50" text-anchor="middle" font-size="12" fill="#333">两手攀足固肾腰</text>
  <!-- 头 -->
  <circle cx="100" cy="125" r="16" stroke="#333" stroke-width="2.5" fill="#faf6eb"/>
  <!-- 身体（弯腰） -->
  <line x1="100" y1="141" x2="100" y2="185" stroke="#333" stroke-width="2.5"/>
  <!-- 双手下探 -->
  <line x1="100" y1="155" x2="90" y2="200" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="155" x2="110" y2="200" stroke="#c41a16" stroke-width="3" stroke-linecap="round"/>
  <!-- 腿 -->
  <line x1="100" y1="185" x2="80" y2="240" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="120" y2="240" stroke="#333" stroke-width="2.5"/>
  <!-- 脚 -->
  <line x1="80" y1="240" x2="67" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="120" y1="240" x2="133" y2="245" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 双上举虚线 -->
  <line x1="90" y1="80" x2="100" y2="108" stroke="#c4a35a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="110" y1="80" x2="100" y2="108" stroke="#c4a35a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="100" y="268" text-anchor="middle" font-size="10" fill="#888">弯腰攀足，膝盖伸直</text>
</svg>
